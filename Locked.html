<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Page 31</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="page entry" role="main" aria-label="Page 31">
        <div class="frame">
            <div class="page-number" aria-hidden="true">31</div>

            <div class="locked-entry">
                <p class="entry-text"> my name 

                    I can't remember my name
                    
                   WHATS MY NAME</p>

                <section
                    id="chess-access-gate"
                    class="chess-access-gate inline-gate"
                    aria-label="Name prompt"
                    data-required-code="Ophelia"
                    data-session-key="arg_locked_page31_unlocked_v1"
                    data-error-message="That is not my name."
                    data-corrupt-on-wrong="true"
                    data-corrupt-class="page31-corrupt-active"
                    data-corrupt-pulse-class="page31-corrupt-pulse"
                    data-corrupt-max="10"
                    data-corrupt-step="2"
                    data-fail-redirect-attempts="5"
                    data-fail-redirect-target="1 egap.html"
                >
                    <input
                        id="chess-access-input"
                        class="chess-access-input"
                        type="text"
                        autocomplete="off"
                        spellcheck="false"
                        aria-label="Enter name"
                    />
                </section>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
