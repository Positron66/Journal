<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chila</title>
    <style>
        :root {
            color-scheme: dark;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 45%, rgba(18, 56, 34, 0.5) 0%, rgba(5, 10, 7, 0.96) 52%, rgba(0, 0, 0, 1) 100%),
                linear-gradient(180deg, #0b120d 0%, #050806 100%);
            font-family: "Modernline", "Segoe Script", "Lucida Handwriting", cursive;
        }

        .page {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .letters-layer {
            position: absolute;
            inset: 0;
        }

        .letter {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 72px;
            height: 92px;
            display: grid;
            place-items: center;
            color: #76d69a;
            font-size: clamp(58px, 7vw, 92px);
            line-height: 1;
            text-shadow:
                0 0 8px rgba(68, 175, 110, 0.35),
                0 0 18px rgba(34, 104, 63, 0.3);
            user-select: none;
            cursor: grab;
            touch-action: none;
            --x: 0px;
            --y: 0px;
            --r: 0deg;
            transform: translate(-50%, -50%) translate(var(--x), var(--y)) rotate(var(--r));
            transition: transform 120ms ease, filter 120ms ease;
        }

        .letter::selection {
            background: transparent;
        }

        .letter.dragging {
            cursor: grabbing;
            filter: brightness(1.14);
            transition: none;
            z-index: 10;
        }

        .hint {
            position: absolute;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%);
            color: rgba(167, 244, 188, 0.55);
            font-family: "Segoe Script", "Lucida Handwriting", cursive;
            font-size: 14px;
            letter-spacing: 0.03em;
            user-select: none;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .letter {
                width: 54px;
                height: 72px;
            }
        }
    </style>
</head>
<body>
    <main class="page" aria-label="Chila page">
        <div class="letters-layer" id="letters-layer" aria-label="Draggable letters spelling chila">
            <span class="letter" data-letter="c" aria-label="letter c">c</span>
            <span class="letter" data-letter="h" aria-label="letter h">h</span>
            <span class="letter" data-letter="i" aria-label="letter i">i</span>
            <span class="letter" data-letter="l" aria-label="letter l">l</span>
            <span class="letter" data-letter="a" aria-label="letter a">a</span>
        </div>
        <div class="hint"></div>
    </main>

    <script>
        (() => {
            const letters = Array.from(document.querySelectorAll('.letter'));
            const layer = document.getElementById('letters-layer');
            const placements = [
                { x: -144, y: -8, r: -5 },
                { x: -76, y: 12, r: 2 },
                { x: -8, y: -18, r: -2 },
                { x: 56, y: 10, r: 4 },
                { x: 124, y: -6, r: -3 }
            ];
            let activeLetter = null;
            let offsetX = 0;
            let offsetY = 0;
            let zIndex = 1;
            let redirectTimer = null;

            function clearRedirectTimer() {
                if (redirectTimer) {
                    clearTimeout(redirectTimer);
                    redirectTimer = null;
                }
            }

            function isSpellAligned() {
                if (placements.length < 5) return false;

                const ordered = placements
                    .map((placement, index) => ({ ...placement, index }))
                    .sort((left, right) => left.x - right.x);

                const word = ordered.map(item => letters[item.index].dataset.letter || '').join('');
                if (word !== 'alich') return false;

                const yValues = ordered.map(item => item.y);
                const averageY = yValues.reduce((sum, value) => sum + value, 0) / yValues.length;
                const maxYOffset = Math.max(...yValues.map(value => Math.abs(value - averageY)));
                const xGaps = [
                    ordered[1].x - ordered[0].x,
                    ordered[2].x - ordered[1].x,
                    ordered[3].x - ordered[2].x,
                    ordered[4].x - ordered[3].x,
                ];
                const averageGap = xGaps.reduce((sum, value) => sum + value, 0) / xGaps.length;
                const maxGapDeviation = Math.max(...xGaps.map(value => Math.abs(value - averageGap)));

                return maxYOffset < 48 && maxGapDeviation < 120;
            }

            function checkForSpellRedirect() {
                if (isSpellAligned()) {
                    if (!redirectTimer) {
                        redirectTimer = setTimeout(() => {
                            if (isSpellAligned()) {
                                window.location.href = 'page1x.html';
                            }
                        }, 6000);
                    }
                    return;
                }

                clearRedirectTimer();
            }

            function applyPosition(letter, x, y, rotation) {
                letter.style.setProperty('--x', `${x}px`);
                letter.style.setProperty('--y', `${y}px`);
                letter.style.setProperty('--r', `${rotation}deg`);
            }

            letters.forEach((letter, index) => {
                const placement = placements[index] || { x: 0, y: 0, r: 0 };
                applyPosition(letter, placement.x, placement.y, placement.r);
                checkForSpellRedirect();

                letter.addEventListener('pointerdown', event => {
                    activeLetter = letter;
                    const rect = letter.getBoundingClientRect();
                    offsetX = event.clientX - (rect.left + rect.width / 2);
                    offsetY = event.clientY - (rect.top + rect.height / 2);
                    letter.classList.add('dragging');
                    letter.style.zIndex = String(++zIndex);
                    letter.setPointerCapture(event.pointerId);
                    event.preventDefault();
                });

                letter.addEventListener('pointermove', event => {
                    if (activeLetter !== letter) return;
                    const layerRect = layer.getBoundingClientRect();
                    const targetCenterX = event.clientX - offsetX;
                    const targetCenterY = event.clientY - offsetY;
                    const x = targetCenterX - (layerRect.left + layerRect.width / 2);
                    const y = targetCenterY - (layerRect.top + layerRect.height / 2);
                    const currentRotation = placements[index] ? placements[index].r : 0;
                    placements[index] = { x, y, r: currentRotation };
                    applyPosition(letter, x, y, currentRotation);
                    checkForSpellRedirect();
                });

                function endDrag(event) {
                    if (activeLetter !== letter) return;
                    letter.classList.remove('dragging');
                    activeLetter = null;
                    checkForSpellRedirect();
                    try {
                        letter.releasePointerCapture(event.pointerId);
                    } catch (error) {
                        // Ignore capture release errors.
                    }
                }

                letter.addEventListener('pointerup', endDrag);
                letter.addEventListener('pointercancel', endDrag);
                letter.addEventListener('lostpointercapture', () => {
                    letter.classList.remove('dragging');
                    activeLetter = null;
                    checkForSpellRedirect();
                });
            });
        })();
    </script>
</body>
</html>
